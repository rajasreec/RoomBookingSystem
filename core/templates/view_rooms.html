<!DOCTYPE html>
<html>
<head>
    <title>View Rooms</title>
</head>
<body>

<h2>All Rooms</h2>

<table border="1">
    <tr>
        <th>Room Name</th>
        <th>Room Type</th>
        <th>Capacity</th>
        <th>Block</th>
        <th>Floor</th>
    </tr>

    {% for room in rooms %}
    <tr>
        <td>{{ room.room_name }}</td>
        <td>{{ room.room_type }}</td>
        <td>{{ room.room_capacity }}</td>
        <td>{{ room.block_name }}</td>
        <td>{{ room.floor }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="5">No rooms available</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
