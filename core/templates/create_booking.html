{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Create Booking</h2>

    <!-- ================= BLOCK SELECTION ================= -->
    <form method="GET" class="mb-4">
        <div class="mb-3">
            <label class="form-label">Select Block</label>
            <select name="block_name" class="form-control" onchange="this.form.submit()">
                <option value="">-- Select Block --</option>
                {% for block in blocks %}
                    <option value="{{ block.block_name }}" {% if block.block_name == selected_block_name %}selected{% endif %}>
                        {{ block.block_name }}
                    </option>
                {% endfor %}
            </select>
        </div>
    </form>

    <!-- ================= BOOKING FORM ================= -->
    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Room</label>
            <select name="room" class="form-control" required>
                <option value="">-- Select Room --</option>
                {% for room in rooms %}
                    <option value="{{ room.id }}">{{ room.room_name }} ({{ room.room_type.type_name }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Date</label>
            <input type="date" name="date" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Start Time</label>
            <input type="time" name="start_time" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">End Time</label>
            <input type="time" name="end_time" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Purpose</label>
            <textarea name="purpose" class="form-control" rows="3" required></textarea>
        </div>

        <button type="submit" class="btn btn-success w-100">Book Room</button>
    </form>
</div>
{% endblock %}
